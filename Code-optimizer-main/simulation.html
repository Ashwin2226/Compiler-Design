<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Code Optimizer — Ashwin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--wa-bg:#0b141a;--wa-panel:#202c33;--wa-teal:#00a884;--wa-bubble-out:#005c4b;--wa-bubble-in:#202c33;--wa-text:#e9edef;--wa-muted:#8696a0;--wa-border:#313d45;--fold:#6ee7b7;--dead:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background-color:var(--wa-bg);color:var(--wa-text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{background:var(--wa-panel);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--wa-border);}
.brand{display:flex;align-items:center;gap:12px;}.avatar{width:40px;height:40px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#0b141a;}

.layout{flex:1;display:grid;grid-template-columns:400px 1fr;overflow:hidden;}

/* Sidebar Editor */
.sidebar{background:#111b21;border-right:1px solid var(--wa-border);display:flex;flex-direction:column;padding:15px;}
.label{color:var(--wa-teal);font-size:12px;font-weight:700;margin-bottom:10px;text-transform:uppercase;}
textarea{flex:1;background:#2a3942;border:none;border-radius:10px;color:#d1d7db;padding:15px;font-family:'JetBrains Mono',monospace;font-size:13px;resize:none;outline:none;}
.controls{display:flex;gap:10px;margin-top:15px;}
.btn-run{flex:1;background:var(--wa-teal);border:none;padding:12px;border-radius:8px;color:#0b141a;font-weight:700;cursor:pointer;}

/* Chat Window */
.chat-window{background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');background-size:contain;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:15px;}
.bubble{max-width:85%;padding:10px 15px;border-radius:10px;font-size:14px;position:relative;box-shadow:0 1px 0.5px rgba(0,0,0,0.13);}
.bubble.in{background:var(--wa-bubble-in);align-self:flex-start;border-top-left-radius:0;}
.bubble.out{background:var(--wa-bubble-out);align-self:flex-end;border-top-right-radius:0;}
.bubble-header{color:var(--wa-teal);font-size:11px;font-weight:700;margin-bottom:5px;text-transform:uppercase;}

/* Optimization styles */
.opt-card{margin-top:8px;padding:8px;background:rgba(0,0,0,0.2);border-radius:5px;border-left:3px solid var(--wa-teal);}
.diff{font-family:monospace;font-size:12px;margin:4px 0;}
.before{color:var(--dead);text-decoration:line-through;}
.after{color:var(--fold);}

footer{background:var(--wa-panel);padding:12px 20px;border-top:1px solid var(--wa-border);display:flex;justify-content:space-between;font-size:13px;color:var(--wa-muted);}
.hidden{display:none;}
</style>
</head>
<body>

<header>
    <div class="brand">
        <div class="avatar">🚀</div>
        <div>
            <h2 style="font-size:16px;font-weight:500;">Ashwin's Code Optimizer</h2>
            <p style="font-size:12px;color:var(--wa-teal);">online (Optimization Engine)</p>
        </div>
    </div>
</header>

<div class="layout">
    <div class="sidebar">
        <span class="label">Input Unoptimized Code</span>
        <textarea id="code" spellcheck="false">int main() {
    int x = 2 + 3;
    int y = x * 1;
    int z = y + 0;
    int a = 10 * 2;
    return z;
}</textarea>
        <div class="controls">
            <button class="btn-run" onclick="optimizeCode()">🚀 Run Optimizer</button>
        </div>
    </div>

    <div class="chat-window" id="chat">
        <div class="bubble in">
            <div class="bubble-header">SYSTEM</div>
            Welcome Ashwin! Ready to optimize. Paste your C/Python code and I will perform Constant Folding, Strength Reduction, and Dead Code Elimination.
        </div>
    </div>
</div>

<footer>
    <div>Student: <strong>Ashwin</strong></div>
    <div>Reg No: <strong>RA2311003050382</strong></div>
</footer>

<script>
function optimizeCode() {
    const chat = document.getElementById('chat');
    const input = document.getElementById('code').value;

    // User Message
    chat.innerHTML += `<div class="bubble out"><div class="bubble-header">YOU</div>Optimizing source...</div>`;

    setTimeout(() => {
        // Mocking Optimization Logic
        let optimizations = [
            { type: "Constant Folding", before: "x = 2 + 3", after: "x = 5" },
            { type: "Algebraic Simplification", before: "y = x * 1", after: "y = x" },
            { type: "Algebraic Simplification", before: "z = y + 0", after: "z = y" },
            { type: "Strength Reduction", before: "a = 10 * 2", after: "a = 10 << 1" }
        ];

        let optHtml = optimizations.map(o => `
            <div class="opt-card">
                <div style="font-size:11px;font-weight:bold;">${o.type}</div>
                <div class="diff before">${o.before}</div>
                <div class="diff after">${o.after}</div>
            </div>
        `).join('');

        chat.innerHTML += `
            <div class="bubble in">
                <div class="bubble-header">OPTIMIZER ENGINE</div>
                Analysis complete. Applied ${optimizations.length} passes:
                ${optHtml}
                <div style="margin-top:10px;font-family:monospace;color:var(--wa-teal);">
                // Optimized Result<br>
                int main() {<br>
                &nbsp;&nbsp;int x = 5;<br>
                &nbsp;&nbsp;int y = x;<br>
                &nbsp;&nbsp;int z = y;<br>
                &nbsp;&nbsp;int a = 10 << 1;<br>
                &nbsp;&nbsp;return z;<br>
                }
                </div>
            </div>
        `;
        chat.scrollTop = chat.scrollHeight;
    }, 800);
}
</script>

</body>
</html>
