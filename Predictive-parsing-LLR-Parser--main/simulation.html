<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Predictive Parser — Ashwin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--wa-bg:#0b141a;--wa-panel:#202c33;--wa-teal:#00a884;--wa-bubble-out:#005c4b;--wa-bubble-in:#202c33;--wa-text:#e9edef;--wa-muted:#8696a0;--wa-border:#313d45;--accent:#38bdf8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background-color:var(--wa-bg);color:var(--wa-text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{background:var(--wa-panel);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--wa-border);}
.brand{display:flex;align-items:center;gap:12px;}.avatar{width:40px;height:40px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#0b141a;}

.layout{flex:1;display:grid;grid-template-columns:420px 1fr;overflow:hidden;}

/* Sidebar Editor */
.sidebar{background:#111b21;border-right:1px solid var(--wa-border);display:flex;flex-direction:column;padding:15px;overflow-y:auto;}
.label{color:var(--wa-teal);font-size:12px;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
textarea{height:150px;background:#2a3942;border:none;border-radius:10px;color:#d1d7db;padding:12px;font-family:'JetBrains Mono',monospace;font-size:13px;resize:none;outline:none;margin-bottom:15px;}
.input-str{background:#2a3942;border:none;border-radius:8px;color:#fff;padding:10px;font-family:monospace;margin-bottom:10px;}
.btn-run{background:var(--wa-teal);border:none;padding:12px;border-radius:8px;color:#0b141a;font-weight:700;cursor:pointer;width:100%;}

/* Chat Window */
.chat-window{background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');background-size:contain;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:15px;}
.bubble{max-width:90%;padding:12px;border-radius:10px;font-size:14px;position:relative;box-shadow:0 1px 0.5px rgba(0,0,0,0.13);}
.bubble.in{background:var(--wa-bubble-in);align-self:flex-start;border-top-left-radius:0;}
.bubble.out{background:var(--wa-bubble-out);align-self:flex-end;border-top-right-radius:0;}
.sender{color:var(--wa-teal);font-size:11px;font-weight:700;margin-bottom:5px;text-transform:uppercase;}

/* Trace Table */
.trace-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: rgba(0,0,0,0.2); }
.trace-table td, .trace-table th { padding: 6px; border: 1px solid rgba(255,255,255,0.1); font-size: 11px; font-family: monospace; }
.match { color: #4ade80; }
.expand { color: var(--accent); }

footer{background:var(--wa-panel);padding:12px 20px;border-top:1px solid var(--wa-border);display:flex;justify-content:space-between;font-size:13px;color:var(--wa-muted);}
</style>
</head>
<body>

<header>
    <div class="brand">
        <div class="avatar">🔮</div>
        <div>
            <h2 style="font-size:16px;font-weight:500;">Ashwin's Predictive Parser</h2>
            <p style="font-size:12px;color:var(--wa-teal);">online (LL(1) Simulation)</p>
        </div>
    </div>
</header>

<div class="layout">
    <div class="sidebar">
        <span class="label">Grammar Rules</span>
        <textarea id="grammar" spellcheck="false">E  -> T E'
E' -> + T E' | ε
T  -> F T'
T' -> * F T' | ε
F  -> ( E ) | id</textarea>
        
        <span class="label">Input String</span>
        <input id="inputStr" class="input-str" value="id + id * id">
        
        <button class="btn-run" onclick="startParsing()">⚡ START PARSING</button>
    </div>

    <div class="chat-window" id="chat">
        <div class="bubble in">
            <div class="sender">SYSTEM</div>
            Hello Ashwin! Enter a grammar and an input string. I will generate the parsing trace showing the **Stack**, **Input**, and **Action** taken at each step.
        </div>
    </div>
</div>

<footer>
    <div>Student: <strong>Ashwin</strong></div>
    <div>Reg No: <strong>RA2311003050382</strong></div>
</footer>

<script>
function startParsing() {
    const chat = document.getElementById('chat');
    const input = document.getElementById('inputStr').value;
    
    chat.innerHTML += `<div class="bubble out"><div class="sender">YOU</div>Parse the string: "${input}"</div>`;

    setTimeout(() => {
        // Simulated Parse Trace
        const steps = [
            { stack: "$ E", input: "id + id * id $", action: "Expand E -> T E'" },
            { stack: "$ E' T", input: "id + id * id $", action: "Expand T -> F T'" },
            { stack: "$ E' T' F", input: "id + id * id $", action: "Expand F -> id" },
            { stack: "$ E' T' id", input: "id + id * id $", action: "Match id" },
            { stack: "$ E' T'", input: "+ id * id $", action: "Expand T' -> ε" },
            { stack: "$ E'", input: "+ id * id $", action: "Expand E' -> + T E'" },
            { stack: "$ E' T +", input: "+ id * id $", action: "Match +" },
            { stack: "$ E' T", input: "id * id $", action: "..." }
        ];

        let tableHtml = steps.map(s => `
            <tr>
                <td>${s.stack}</td>
                <td>${s.input}</td>
                <td class="${s.action.includes('Match') ? 'match' : 'expand'}">${s.action}</td>
            </tr>
        `).join('');

        chat.innerHTML += `
            <div class="bubble in">
                <div class="sender">PARSER ENGINE</div>
                Parsing Trace for: **${input}**
                <table class="trace-table">
                    <thead><tr><th>Stack</th><th>Input</th><th>Action</th></tr></thead>
                    <tbody>${tableHtml}</tbody>
                </table>
                <div style="margin-top:10px; color:#4ade80; font-weight:bold;">✅ ACCEPTED</div>
            </div>
        `;
        chat.scrollTop = chat.scrollHeight;
    }, 800);
}
</script>

</body>
</html>
